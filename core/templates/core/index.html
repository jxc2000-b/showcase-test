{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bryan</title>
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>
  <main class="hero">
    <!-- stacked canvases: later ones paint on top, so the fixed stacking
         order is skeletal > circulatory > nervous over the silhouette -->
    <div class="figure" aria-hidden="true">
      <canvas id="layer-silhouette" class="pixel-layer always-on"></canvas>
      <canvas id="layer-nervous" class="pixel-layer" data-layer="nervous"></canvas>
      <canvas id="layer-circulatory" class="pixel-layer" data-layer="circulatory"></canvas>
      <canvas id="layer-skeletal" class="pixel-layer" data-layer="skeletal"></canvas>
    </div>

    <section class="prose">
      <!-- the dimmed keywords in this paragraph drive the same layer
           toggles as the pill buttons below -->
      <p>
        My name is Finn, I am a software engineer building and
        <button class="keyword" type="button" data-layer="nervous" aria-pressed="false">thinking</button>
        about the future. In my free time I
        <button class="keyword" type="button" data-layer="skeletal" aria-pressed="false">hike</button>
        and my
        <button class="keyword" type="button" data-layer="circulatory" aria-pressed="false">passions</button>
        are many.
      </p>

      <p class="hint">Combine freely &mdash; they always stack skeleton over circulation over nerves.</p>
    </section>
  </main>

  {{ layers|json_script:'layers-data' }}
  <script src="{% static 'core/js/main.js' %}"></script>
</body>
</html>
