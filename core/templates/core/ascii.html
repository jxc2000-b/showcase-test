{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASCII silhouette — test area</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #e9e9e9;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #8b8b93;
      font-size: 13px;
    }
    canvas {
      image-rendering: pixelated;
      width: min(90vw, 900px);
    }
  </style>
</head>
<body>
  <canvas id="board"></canvas>
  <p>{{ label }}</p>

  {{ grid|json_script:"ascii-grid" }}

  <script src="{% static 'core/js/ascii.js' %}"></script>
</body>
</html>
