{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel editor — test area</title>
  <style>
    :root {
      --bg: #17171a;
      --panel: #1f1f24;
      --panel-border: #2c2c33;
      --ink: #e8e8ea;
      --dim: #8b8b93;
      --accent: #2d4ada;
      --cell-off: #232329;
      --cell-on: #f0f0f2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
    }
    .wrap {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }
    .panel {
      flex: 0 0 250px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 18px;
      position: sticky;
      top: 20px;
    }
    .panel h1 {
      font-size: 15px;
      margin: 0 0 4px;
    }
    .panel .sub {
      color: var(--dim);
      font-size: 12px;
      margin: 0 0 16px;
    }
    .group { margin-bottom: 16px; }
    .group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--dim);
      margin-bottom: 6px;
    }
    .row { display: flex; gap: 6px; flex-wrap: wrap; }
    button, select {
      font: inherit;
      color: var(--ink);
      background: #2a2a31;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 7px 11px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    button:hover, select:hover { background: #33333b; }
    button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { filter: brightness(1.12); }
    button:disabled { opacity: 0.4; cursor: default; }
    .stat { color: var(--dim); font-size: 12px; }
    #status { font-size: 12px; min-height: 1.2em; margin-top: 4px; }
    #status.ok { color: #6fdc8c; }
    #status.err { color: #ff7a7a; }
    textarea {
      width: 100%;
      height: 110px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 9px;
      line-height: 1.1;
      color: var(--dim);
      background: #141417;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 8px;
      resize: vertical;
    }
    .stage { flex: 1 1 auto; text-align: center; }
    canvas {
      background: var(--cell-off);
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      cursor: crosshair;
      touch-action: none;
      image-rendering: pixelated;
    }
    kbd {
      background: #2a2a31;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
      border: 1px solid var(--panel-border);
    }
    .keys { color: var(--dim); font-size: 12px; line-height: 2; }
    @media (max-width: 900px) {
      .wrap { flex-direction: column; }
      .panel { position: static; flex-basis: auto; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel">
      <h1>Pixel editor</h1>
      <p class="sub">{{ width }}&times;{{ height }} grid &middot; test area, does not touch the live page</p>

      <div class="group">
        <label>Tool</label>
        <div class="row">
          <button id="tool-brush" class="on" type="button">Brush <kbd>b</kbd></button>
          <button id="tool-erase" type="button">Eraser <kbd>e</kbd></button>
        </div>
      </div>

      <div class="group">
        <label>Brush size</label>
        <div class="row">
          <select id="brush-size">
            <option value="1" selected>1 px</option>
            <option value="2">2 px</option>
            <option value="3">3 px</option>
          </select>
          <button id="toggle-grid" class="on" type="button" title="gridlines">Grid <kbd>g</kbd></button>
        </div>
      </div>

      <div class="group">
        <label>History</label>
        <div class="row">
          <button id="undo" type="button">Undo <kbd>ctrl+z</kbd></button>
          <button id="redo" type="button">Redo <kbd>ctrl+y</kbd></button>
        </div>
      </div>

      <div class="group">
        <label>Canvas</label>
        <div class="row">
          <button id="load-generated" type="button" title="current silhouette (96×144)">Load base</button>
          <button id="clear" type="button">Clear</button>
        </div>
      </div>

      <div class="group">
        <label>Export</label>
        <div class="row">
          <button id="copy" type="button">Copy rows</button>
          <button id="download" type="button">Download .txt</button>
          <button id="save" class="primary" type="button">Save to server</button>
        </div>
        <p id="status"></p>
        <p class="stat"><span id="lit-count">0</span> / {{ width }}&times;{{ height }} px lit</p>
      </div>

      <div class="group">
        <label>Rows (live)</label>
        <textarea id="rows-out" readonly spellcheck="false"></textarea>
      </div>

      <p class="keys">
        drag&nbsp;=&nbsp;paint &middot; right-drag / <kbd>shift</kbd>&nbsp;=&nbsp;erase<br>
        <kbd>ctrl+z</kbd> undo &middot; <kbd>ctrl+y</kbd> redo
      </p>
    </aside>

    <div class="stage">
      <canvas id="board" data-width="{{ width }}" data-height="{{ height }}" data-save-url="{% url 'save-silhouette' %}"></canvas>
    </div>
  </div>

  {{ generated_silhouette|json_script:"generated-silhouette" }}

  <script src="{% static 'core/js/editor.js' %}"></script>
</body>
</html>
